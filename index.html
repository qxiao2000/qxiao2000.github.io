<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>qxiao2000 - Personal Website</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            line-height: 1.6;
            color: #333;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .container {
            background: white;
            padding: 3rem;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            max-width: 600px;
            width: 90%;
            text-align: center;
        }
        h1 {
            font-size: 2.5rem;
            margin-bottom: 0.5rem;
            color: #2d3748;
        }
        .tagline {
            font-size: 1.2rem;
            color: #718096;
            margin-bottom: 2rem;
        }
        .links {
            display: flex;
            gap: 1rem;
            justify-content: center;
            flex-wrap: wrap;
            margin-top: 2rem;
        }
        .links a {
            display: inline-block;
            padding: 0.75rem 1.5rem;
            background: #667eea;
            color: white;
            text-decoration: none;
            border-radius: 50px;
            transition: transform 0.2s, background 0.2s;
        }
        .links a:hover {
            transform: translateY(-2px);
            background: #764ba2;
        }
        footer {
            margin-top: 2rem;
            font-size: 0.9rem;
            color: #a0aec0;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Hello, I'm qxiao2000!</h1>
        <p class="tagline">Welcome to my personal website.</p>
        <p>This site is powered by GitHub Pages. More content coming soon!</p>

        <div class="links">
            <a href="https://github.com/qxiao2000" target="_blank">GitHub</a>
        </div>

        <footer>
            <p>© 2026 qxiao2000</p>
        </footer>
    </div>
</body>
</html>
